services:
  - type: web
    name: ai-github-pr-review-agent
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
      - key: OPENAI_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: AUTO_MERGE_ON_APPROVAL
        value: "false"
      - key: GITHUB_MERGE_METHOD
        value: squash
